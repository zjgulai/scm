name: scm_governance_workbench

services:
  scm-governance-workbench:
    build:
      context: .
      dockerfile: Dockerfile
    image: scm-governance-workbench:20260618
    container_name: scm-governance-workbench
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "5174"
      SCM_RELEASE_ID: ${SCM_RELEASE_ID:-local-compose}
      SCM_GIT_SHA: ${SCM_GIT_SHA:-unknown}
      SCM_DATA_MOUNT_TYPE: ${SCM_DATA_MOUNT_TYPE:-image_embedded_data}
      SCM_DATA_VOLUME_NAME: ${SCM_DATA_VOLUME_NAME:-}
      SCM_DATA_MOUNT_PATH: ${SCM_DATA_MOUNT_PATH:-/app/data}
      SCM_PROJECT_ROOT: /app
      SCM_AI_KNOWLEDGE_EVIDENCE_PATH: runtime/evidence/ai-knowledge-evidence-quality-review-20260622.json
      SCM_DEEPSEEK_PROVIDER_CALL_AUTHORIZED: ${SCM_DEEPSEEK_PROVIDER_CALL_AUTHORIZED:-0}
      SCM_DATABASE_WRITES_AUTHORIZED: ${SCM_DATABASE_WRITES_AUTHORIZED:-0}
    ports:
      - "127.0.0.1:5174:5174"
    networks:
      - scm-governance-net

networks:
  scm-governance-net:
    name: scm_governance_net
    driver: bridge
