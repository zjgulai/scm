<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="1280" height="720" fill="#ffffff"/>
  <text x="40" y="44" fill="#111827" font-size="22" font-weight="650">积加 SCM 指标体系图</text>
  <text x="40" y="68" fill="#6b7280" font-size="13">指标按 L0-L4 分层，并按 PLAN/PUR/WH/LOG/COST 业务域治理</text>

  <rect x="40" y="100" width="1180" height="260" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.1" stroke-dasharray="6,4"/>
  <text x="54" y="122" fill="#6b7280" font-size="11" font-weight="600">指标分层</text>

  <g id="layer0">
    <rect x="80" y="160" width="170" height="96" rx="4" fill="#f9fafb" stroke="#d1d5db" stroke-width="1.2"/>

    <text x="165" y="188" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">L0 源字段</text>
    <text x="165" y="232" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">计划量/采购量/交货量/已入库</text>
<text x="165" y="244" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">/可用量/物流费用</text>
  </g>

  <g id="layer1">
    <rect x="310" y="160" width="170" height="96" rx="4" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.2"/>

    <text x="395" y="188" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">L1 状态指标</text>
    <text x="395" y="232" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">待分单/未交/待入库/待拣货/</text>
<text x="395" y="244" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">待出运/已出运</text>
  </g>

  <g id="layer2">
    <rect x="540" y="160" width="170" height="96" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="1.2"/>

    <text x="625" y="188" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">L2 计算指标</text>
    <text x="625" y="232" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">目标库存量/推荐采购量/入库完</text>
<text x="625" y="244" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">成率/估实差异率</text>
  </g>

  <g id="layer3">
    <rect x="770" y="160" width="170" height="96" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>

    <text x="855" y="188" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">L3 运营指标</text>
    <text x="855" y="232" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">缺货风险/采购准交率/库存周转</text>
<text x="855" y="244" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">/物流成本偏差</text>
  </g>

  <g id="layer4">
    <rect x="1000" y="160" width="170" height="96" rx="4" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.2"/>

    <text x="1085" y="188" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">L4 决策指标</text>
    <text x="1085" y="232" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">是否下单/调拨/换物流/处理差</text>
<text x="1085" y="244" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">异</text>
  </g>

  <path d="M 250 208 L 310 208" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>


  <path d="M 480 208 L 540 208" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>


  <path d="M 710 208 L 770 208" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>


  <path d="M 940 208 L 1000 208" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>


  <rect x="40" y="420" width="1180" height="220" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.1" stroke-dasharray="6,4"/>
  <text x="54" y="442" fill="#6b7280" font-size="11" font-weight="600">业务域</text>

  <g id="domain0">
    <rect x="80" y="485" width="170" height="76" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="165" y="513" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">PLAN 计划</text>
    <text x="165" y="549" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">智能补货/红绿线</text>
  </g>

  <g id="domain1">
    <rect x="310" y="485" width="170" height="76" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="395" y="513" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">PUR 采购</text>
    <text x="395" y="549" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">分单/PO/交货</text>
  </g>

  <g id="domain2">
    <rect x="540" y="485" width="170" height="76" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="625" y="513" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">WH 仓库</text>
    <text x="625" y="549" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">库存/批次/出入库</text>
  </g>

  <g id="domain3">
    <rect x="770" y="485" width="170" height="76" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="855" y="513" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">LOG 物流</text>
    <text x="855" y="549" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">发货/运输/费用</text>
  </g>

  <g id="domain4">
    <rect x="1000" y="485" width="170" height="76" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="1085" y="513" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">COST 成本</text>
    <text x="1085" y="549" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">供应商/物流/对账</text>
  </g>

  <path d="M 165 256 L 165 485" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="123" y="349.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="165" y="362.5" fill="#374151" font-size="10" text-anchor="middle">落域</text>

  <path d="M 395 256 L 395 485" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="353" y="349.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="395" y="362.5" fill="#374151" font-size="10" text-anchor="middle">落域</text>

  <path d="M 625 256 L 625 485" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="583" y="349.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="625" y="362.5" fill="#374151" font-size="10" text-anchor="middle">落域</text>

  <path d="M 855 256 L 855 485" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="813" y="349.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="855" y="362.5" fill="#374151" font-size="10" text-anchor="middle">落域</text>

  <path d="M 1085 256 L 1085 485" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="1043" y="349.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="1085" y="362.5" fill="#374151" font-size="10" text-anchor="middle">落域</text>
  <text x="80" y="690" fill="#6b7280" font-size="13">治理要求：L2 以上指标必须记录依赖字段、参数快照、状态过滤、刷新时间和来源系统。</text>

</svg>