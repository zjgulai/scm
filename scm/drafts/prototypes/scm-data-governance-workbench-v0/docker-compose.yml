name: scm_governance_workbench

services:
  scm-governance-workbench:
    build:
      context: .
      dockerfile: Dockerfile
    image: scm-governance-workbench:20260618
    container_name: scm-governance-workbench
    restart: unless-stopped
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: "5174"
      SCM_RELEASE_ID: ${SCM_RELEASE_ID:-local-compose}
      SCM_GIT_SHA: ${SCM_GIT_SHA:-unknown}
      SCM_DATA_MOUNT_TYPE: ${SCM_DATA_MOUNT_TYPE:-docker_external_volume}
      SCM_DATA_VOLUME_NAME: ${SCM_DATA_VOLUME_NAME:-scm_governance_workbench_scm-governance-data}
    ports:
      - "127.0.0.1:5174:5174"
    volumes:
      - scm-governance-data:/app/data
    networks:
      - scm-governance-net
      - lighthouse-ai-video-net

volumes:
  scm-governance-data:
    external: true
    name: scm_governance_workbench_scm-governance-data

networks:
  scm-governance-net:
    name: scm_governance_net
    driver: bridge
  lighthouse-ai-video-net:
    name: lighthouse_ai_video_net
    external: true
