<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>积加 SCM 数据知识库架构图</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js" integrity="sha384-ZZ1pncU3bQe8y31yfZdMFdSpttDoPmOZg2wguVK9almUodir1PghgT0eY7Mrty8H" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js" integrity="sha384-en/ztfPSRkGfME4KIm05joYXynqzUgbsG5nMrj/xEFAHXkeZfO3yMK8QQ+mP7p1/" crossorigin="anonymous"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'JetBrains Mono', 'PingFang SC', monospace; background: #020617; min-height: 100vh; padding: 2rem; color: white; }
    .container { max-width: 1240px; margin: 0 auto; }
    .header { margin-bottom: 1.5rem; }
    .header-row { display: flex; align-items: center; gap: 1rem; margin-bottom: .5rem; }
    .pulse-dot { width: 12px; height: 12px; background: #22d3ee; border-radius: 50%; animation: pulse 2s infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .45; } }
    h1 { font-size: 1.45rem; font-weight: 700; }
    .subtitle { color: #94a3b8; font-size: .82rem; margin-left: 1.75rem; }
    .diagram-container { background: rgba(15, 23, 42, .5); border-radius: 1rem; border: 1px solid #1e293b; padding: 1.5rem; overflow-x: auto; }
    svg { width: 100%; min-width: 980px; display: block; }
    .cards { display: grid; grid-template-columns: repeat(3, minmax(260px, 1fr)); gap: 1rem; margin-top: 1.5rem; }
    .card { background: rgba(15, 23, 42, .5); border-radius: .75rem; border: 1px solid #1e293b; padding: 1rem; }
    .card h3 { font-size: .86rem; margin-bottom: .65rem; }
    .card p, .card li { color: #94a3b8; font-size: .74rem; line-height: 1.55; }
    .card ul { list-style: none; }
    .footer { text-align: center; margin-top: 1rem; color: #475569; font-size: .72rem; }
    .toolbar { display: flex; gap: .5rem; margin-left: auto; align-items: center; }
    .toolbar-toggle { background: transparent; border: none; color: #475569; cursor: pointer; font-size: 1.25rem; padding: .25rem .5rem; border-radius: .375rem; }
    .toolbar-toggle:hover { color: #94a3b8; background: rgba(30,41,59,.5); }
    .toolbar-actions { display: none; gap: .5rem; }
    .toolbar.expanded .toolbar-actions { display: flex; }
    .toolbar-actions button { background: rgba(30,41,59,.8); border: 1px solid #334155; color: #94a3b8; padding: .35rem .7rem; border-radius: .375rem; font-family: inherit; font-size: .72rem; cursor: pointer; white-space: nowrap; }
    @media print { .toolbar { display: none !important; } }
  </style>
</head>
<body>
<div class="container" id="report-container">
  <div class="header">
    <div class="header-row">
      <div class="pulse-dot"></div>
      <h1>积加 SCM 数据知识库业务架构</h1>
      <div class="toolbar">
        <div class="toolbar-actions">
          <button onclick="copyAsImage(this)">Copy</button>
          <button onclick="downloadPNG(this)">PNG</button>
          <button onclick="downloadPDF(this)">PDF</button>
        </div>
        <button class="toolbar-toggle" onclick="this.parentElement.classList.toggle('expanded')" title="Export options" aria-label="Export options">...</button>
      </div>
    </div>
    <p class="subtitle">仓库重采：40页，24页有表格数据，1页状态有量。 来源包括帮助文档、ERP 实采页面、后续导出/API。</p>
  </div>

      <rect x="90" y="230" width="160" height="74" rx="8" fill="#0f172a"/><rect x="90" y="230" width="160" height="74" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="170" y="260" fill="white" font-size="12" font-weight="700" text-anchor="middle">计划域</text><text x="170" y="282" fill="#94a3b8" font-size="9" text-anchor="middle">推荐采购量/缺货</text>
      <rect x="300" y="230" width="160" height="74" rx="8" fill="#0f172a"/><rect x="300" y="230" width="160" height="74" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="380" y="260" fill="white" font-size="12" font-weight="700" text-anchor="middle">采购域</text><text x="380" y="282" fill="#94a3b8" font-size="9" text-anchor="middle">分单/PO/交货</text>
      <rect x="510" y="230" width="160" height="74" rx="8" fill="#0f172a"/><rect x="510" y="230" width="160" height="74" rx="8" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/><text x="590" y="260" fill="white" font-size="12" font-weight="700" text-anchor="middle">仓库域</text><text x="590" y="282" fill="#94a3b8" font-size="9" text-anchor="middle">库存/批次/流水</text>
      <rect x="720" y="230" width="160" height="74" rx="8" fill="#0f172a"/><rect x="720" y="230" width="160" height="74" rx="8" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1.5"/><text x="800" y="260" fill="white" font-size="12" font-weight="700" text-anchor="middle">物流域</text><text x="800" y="282" fill="#94a3b8" font-size="9" text-anchor="middle">发货/包裹/费用</text>
      <rect x="930" y="230" width="160" height="74" rx="8" fill="#0f172a"/><rect x="930" y="230" width="160" height="74" rx="8" fill="rgba(136,19,55,.4)" stroke="#fb7185" stroke-width="1.5"/><text x="1010" y="260" fill="white" font-size="12" font-weight="700" text-anchor="middle">稽核域</text><text x="1010" y="282" fill="#94a3b8" font-size="9" text-anchor="middle">FBA/三方仓/费用</text>
      <path d="M 550 175 L 550 230" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/><text x="550" y="195.5" fill="#94a3b8" font-size="8" text-anchor="middle">源字段</text>
      <path d="M 250 267 L 300 267" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/>
      <path d="M 460 267 L 510 267" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/>
      <path d="M 670 267 L 720 267" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/>
      <path d="M 880 267 L 930 267" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/>
      <rect x="90" y="400" width="190" height="80" rx="8" fill="#0f172a"/><rect x="90" y="400" width="190" height="80" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="185" y="430" fill="white" font-size="12" font-weight="700" text-anchor="middle">ODS/DWD</text><text x="185" y="452" fill="#94a3b8" font-size="9" text-anchor="middle">原始导出/API -&gt; 明细事实</text>
      <rect x="350" y="400" width="190" height="80" rx="8" fill="#0f172a"/><rect x="350" y="400" width="190" height="80" rx="8" fill="rgba(120,53,15,.3)" stroke="#fbbf24" stroke-width="1.5"/><text x="445" y="430" fill="white" font-size="12" font-weight="700" text-anchor="middle">DWS/ADS</text><text x="445" y="452" fill="#94a3b8" font-size="9" text-anchor="middle">快照宽表 -&gt; 指标服务</text>
      <rect x="610" y="400" width="190" height="80" rx="8" fill="#0f172a"/><rect x="610" y="400" width="190" height="80" rx="8" fill="rgba(76,29,149,.4)" stroke="#a78bfa" stroke-width="1.5"/><text x="705" y="430" fill="white" font-size="12" font-weight="700" text-anchor="middle">META</text><text x="705" y="452" fill="#94a3b8" font-size="9" text-anchor="middle">字段/指标/血缘/参数</text>
      <rect x="870" y="400" width="190" height="80" rx="8" fill="#0f172a"/><rect x="870" y="400" width="190" height="80" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="965" y="430" fill="white" font-size="12" font-weight="700" text-anchor="middle">知识库</text><text x="965" y="452" fill="#94a3b8" font-size="9" text-anchor="middle">页面/实体/指标/质量规则</text>
      <path d="M 550 304 L 185 400" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/><text x="367.5" y="345" fill="#94a3b8" font-size="8" text-anchor="middle">抽取</text>

      <path d="M 800 440 L 870 440" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/><text x="835" y="433" fill="#94a3b8" font-size="8" text-anchor="middle">沉淀</text>
      <rect x="145" y="575" width="220" height="74" rx="8" fill="#0f172a"/><rect x="145" y="575" width="220" height="74" rx="8" fill="rgba(8,51,68,.4)" stroke="#22d3ee" stroke-width="1.5"/><text x="255" y="605" fill="white" font-size="12" font-weight="700" text-anchor="middle">P0</text><text x="255" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">库存快照 / 库存流水 / 批次库存</text>
      <rect x="410" y="575" width="220" height="74" rx="8" fill="#0f172a"/><rect x="410" y="575" width="220" height="74" rx="8" fill="rgba(6,78,59,.4)" stroke="#34d399" stroke-width="1.5"/><text x="520" y="605" fill="white" font-size="12" font-weight="700" text-anchor="middle">P1</text><text x="520" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">出库包裹 / 三方仓入库 / 物流运输</text>
      <rect x="675" y="575" width="220" height="74" rx="8" fill="#0f172a"/><rect x="675" y="575" width="220" height="74" rx="8" fill="rgba(136,19,55,.4)" stroke="#fb7185" stroke-width="1.5"/><text x="785" y="605" fill="white" font-size="12" font-weight="700" text-anchor="middle">P2</text><text x="785" y="627" fill="#94a3b8" font-size="9" text-anchor="middle">入库质检 / 库龄 / FBA 对账复核</text>
      <path d="M 450 480 L 255 575" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/><text x="352.5" y="520.5" fill="#94a3b8" font-size="8" text-anchor="middle">落地</text>
      <path d="M 540 480 L 520 575" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/><text x="530" y="520.5" fill="#94a3b8" font-size="8" text-anchor="middle">扩展</text>
      <path d="M 700 480 L 785 575" fill="none" stroke="#64748b" stroke-width="1.4" marker-end="url(#arrowhead)"/><text x="742.5" y="520.5" fill="#94a3b8" font-size="8" text-anchor="middle">校验</text>
    </svg>
  </div>
  <div class="cards">
    <div class="card"><h3>证据边界</h3><p>UI 可见字段和页签能支撑第一版知识库，不等于最终 API 字段合同。</p></div>
    <div class="card"><h3>建模优先级</h3><p>先落库存快照、批次、流水、销售出库、包裹、三方仓入库和仓库主数据。</p></div>
    <div class="card"><h3>治理约束</h3><p>状态页签、分页总数、合计窗口必须分口径保存，不能直接混算。</p></div>
  </div>
  <div class="footer">Generated 2026-06-04 · Jijia SCM draft knowledge base</div>
</div>
<script>
async function captureNode(button) {
  const toolbar = button.closest('.toolbar');
  if (toolbar) toolbar.classList.remove('expanded');
  const target = document.getElementById('report-container');
  const rect = target.getBoundingClientRect();
  return await html2canvas(document.body, {
    x: rect.left - 32 + window.scrollX,
    y: rect.top - 32 + window.scrollY,
    width: rect.width + 64,
    height: rect.height + 64,
    scale: 2,
    backgroundColor: '#020617',
    ignoreElements: (el) => el.classList && el.classList.contains('toolbar')
  });
}
async function copyAsImage(button) {
  const canvas = await captureNode(button);
  canvas.toBlob(async (blob) => {
    await navigator.clipboard.write([new ClipboardItem({ 'image/png': blob })]);
  });
}
async function downloadPNG(button) {
  const canvas = await captureNode(button);
  const a = document.createElement('a');
  a.download = 'jijia-scm-business-architecture.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}
async function downloadPDF(button) {
  const canvas = await captureNode(button);
  const img = canvas.toDataURL('image/png');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF({ orientation: 'landscape', unit: 'px', format: [canvas.width, canvas.height] });
  pdf.addImage(img, 'PNG', 0, 0, canvas.width, canvas.height);
  pdf.save('jijia-scm-business-architecture.pdf');
}
</script>
</body>
</html>
