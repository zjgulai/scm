  <rect x="40" y="105" width="1180" height="540" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.1" stroke-dasharray="6,4"/>
  <text x="54" y="127" fill="#6b7280" font-size="11" font-weight="600">数据流转</text>

  <g id="docs">
