<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" width="1280" height="760">
  <style>
    text { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
  </style>
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#3b82f6"/>
    </marker>
  </defs>
  <rect width="1280" height="760" fill="#ffffff"/>
  <text x="40" y="44" fill="#111827" font-size="22" font-weight="650">积加 SCM 数据血缘关系图</text>
  <text x="40" y="68" fill="#6b7280" font-size="13">字段、单据、流水、快照、参数和指标之间的可追溯关系</text>

  <rect x="40" y="100" width="1180" height="560" rx="8" fill="none" stroke="#d1d5db" stroke-width="1.1" stroke-dasharray="6,4"/>
  <text x="54" y="122" fill="#6b7280" font-size="11" font-weight="600">数据血缘</text>

  <g id="source">
    <rect x="80" y="145" width="150" height="58" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="155" y="173" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">源系统/页面</text>
    <text x="155" y="191" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">帮助文档/ERP/导出/API</text>
  </g>

  <g id="orders">
    <rect x="300" y="145" width="150" height="58" rx="4" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.2"/>

    <text x="375" y="173" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">业务单据</text>
    <text x="375" y="179" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">计划/PO/LN/发货/入库/</text>
<text x="375" y="191" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">出库</text>
  </g>

  <g id="flow">
    <rect x="520" y="145" width="150" height="58" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="1.2"/>

    <text x="595" y="173" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">库存流水</text>
    <text x="595" y="191" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">良品/次品变化</text>
  </g>

  <g id="snapshot">
    <rect x="740" y="145" width="150" height="58" rx="4" fill="#ecfdf5" stroke="#34d399" stroke-width="1.2"/>

    <text x="815" y="173" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">库存快照</text>
    <text x="815" y="191" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">SKU/仓库/站点/日期</text>
  </g>

  <g id="metric">
    <rect x="960" y="145" width="150" height="58" rx="4" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.2"/>

    <text x="1035" y="173" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">指标</text>
    <text x="1035" y="191" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">可用/在途/推荐采购</text>
  </g>

  <path d="M 230 174 L 300 174" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="223" y="153" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="265" y="166" fill="#374151" font-size="10" text-anchor="middle">字段</text>

  <path d="M 450 174 L 520 174" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="443" y="153" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="485" y="166" fill="#374151" font-size="10" text-anchor="middle">触发</text>

  <path d="M 670 174 L 740 174" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="663" y="153" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="705" y="166" fill="#374151" font-size="10" text-anchor="middle">汇总</text>

  <path d="M 890 174 L 960 174" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="883" y="153" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="925" y="166" fill="#374151" font-size="10" text-anchor="middle">计算</text>


  <g id="param">
    <rect x="300" y="330" width="150" height="58" rx="4" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.2"/>

    <text x="375" y="358" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">参数快照</text>
    <text x="375" y="376" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">补货/映射/物流时效</text>
  </g>

  <g id="status">
    <rect x="520" y="330" width="150" height="58" rx="4" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.2"/>

    <text x="595" y="358" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">状态枚举</text>
    <text x="595" y="376" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">待入库/待出运/已完成</text>
  </g>

  <g id="external">
    <rect x="740" y="330" width="150" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>

    <text x="815" y="358" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">外部库存</text>
    <text x="815" y="376" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">FBA/三方仓/平台报告</text>
  </g>

  <g id="reconcile">
    <rect x="960" y="330" width="150" height="58" rx="4" fill="#fee2e2" stroke="#ef4444" stroke-width="1.2"/>

    <text x="1035" y="358" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">对账差异</text>
    <text x="1035" y="376" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">ERP vs 外部系统</text>
  </g>

  <path d="M 375 330 L 960 203" fill="none" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
  <rect x="625.5" y="245.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="667.5" y="258.5" fill="#374151" font-size="10" text-anchor="middle">公式参数</text>

  <path d="M 595 330 L 960 203" fill="none" stroke="#3b82f6" stroke-width="1.7" stroke-dasharray="5,4" marker-end="url(#arrow-blue)"/>
  <rect x="735.5" y="245.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="777.5" y="258.5" fill="#374151" font-size="10" text-anchor="middle">过滤规则</text>

  <path d="M 815 330 L 960 359" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="845.5" y="323.5" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="887.5" y="336.5" fill="#374151" font-size="10" text-anchor="middle">比较</text>


  <g id="kgpage">
    <rect x="180" y="520" width="150" height="58" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="255" y="548" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">Page</text>
    <text x="255" y="566" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">页面节点</text>
  </g>

  <g id="kgfield">
    <rect x="390" y="520" width="150" height="58" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="465" y="548" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">Field</text>
    <text x="465" y="566" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">字段节点</text>
  </g>

  <g id="kgfact">
    <rect x="600" y="520" width="150" height="58" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="675" y="548" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">Fact</text>
    <text x="675" y="566" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">事实表节点</text>
  </g>

  <g id="kgmetric">
    <rect x="810" y="520" width="150" height="58" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="885" y="548" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">Metric</text>
    <text x="885" y="566" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">指标节点</text>
  </g>

  <g id="kgdq">
    <rect x="1020" y="520" width="150" height="58" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="1.2"/>

    <text x="1095" y="548" fill="#111827" font-size="13" font-weight="500" text-anchor="middle">Rule</text>
    <text x="1095" y="566" fill="#6b7280" font-size="10" font-weight="400" text-anchor="middle">质量规则节点</text>
  </g>

  <path d="M 330 549 L 390 549" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="318" y="528" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="360" y="541" fill="#374151" font-size="10" text-anchor="middle">contains</text>

  <path d="M 540 549 L 600 549" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="528" y="528" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="570" y="541" fill="#374151" font-size="10" text-anchor="middle">maps_to</text>

  <path d="M 750 549 L 810 549" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="738" y="528" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="780" y="541" fill="#374151" font-size="10" text-anchor="middle">defines</text>

  <path d="M 960 549 L 1020 549" fill="none" stroke="#3b82f6" stroke-width="1.7" marker-end="url(#arrow-blue)"/>
  <rect x="948" y="528" width="84" height="18" rx="3" fill="#ffffff" opacity="0.92"/><text x="990" y="541" fill="#374151" font-size="10" text-anchor="middle">checked_by</text>

</svg>